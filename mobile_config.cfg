# ═══════════════════════════════════════════════════════════════════
# MOBILE UI CONFIGURATION
# ═══════════════════════════════════════════════════════════════════
# Configuration file for mobile-responsive UI system
# Edit these values to customize mobile behavior
# Hot-reload supported: changes take effect on next scene load
# ═══════════════════════════════════════════════════════════════════

[scaling]
# UI scale factor for mobile devices (1.5 = 150% larger)
ui_scale = 1.5

# Font scale factor for mobile readability (1.4 = 140% larger)
font_scale = 1.4

# Game object scale factor for interactive elements (1.4 = 140% larger)
game_object_scale = 1.4

# Collectible scale factor (1.3 = 130% larger)
collectible_scale = 1.3

[sizes]
# Minimum button size for touch targets (width, height in pixels)
button_min_size = Vector2(100, 60)

# Minimum touch target size for all interactive elements (width, height in pixels)
touch_target_min_size = Vector2(80, 80)

[spacing]
# Vertical spacing between buttons (pixels)
button_vertical = 20.0

# Horizontal spacing between buttons (pixels)
button_horizontal = 15.0

# Minimum margin from safe area boundaries (pixels)
# Prevents UI from being obscured by notches or rounded corners
safe_area_margin = 20.0

# Edge dead zone size (pixels)
# Ignores touches within this distance from screen edges to prevent accidental input
edge_dead_zone = 15.0

[performance]
# Particle reduction factor (0.4 = reduce to 40% of original count)
particle_reduction = 0.4

# Maximum simultaneous tweens allowed
max_tweens = 10

# Target FPS for mobile devices
target_fps = 30

[gameplay]
# Game speed reduction (0.15 = 15% slower)
# Makes games more manageable on mobile
speed_reduction = 0.15

# Timing window increase (0.2 = 20% larger window)
# Gives more time for timing-based actions
timing_window_increase = 0.2

# Spawn rate reduction (0.1 = 10% slower spawning)
# Reduces object spawn frequency
spawn_rate_reduction = 0.1

# Drag smoothing increase (1.5 = 50% more smoothing)
# Reduces jitter in drag operations
drag_smoothing_increase = 1.5
